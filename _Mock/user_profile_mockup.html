<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-gray-100">
    <header class="p-4 text-center text-white bg-blue-500">
        <h1 class="text-2xl font-bold">ユーザープロフィール</h1>
    </header>
    <main class="p-8">
        <section class="p-6 bg-white border border-gray-300 rounded-lg shadow-md">
            <div class="flex items-center mb-4">
                <img src="https://via.placeholder.com/100" alt="プロフィール画像" class="w-24 h-24 mr-4 rounded-full">
                <div>
                    <h2 class="text-xl font-semibold text-gray-800">ユーザー名</h2>
                    <p class="text-gray-600">@username</p>
                </div>
            </div>
            <div class="mb-4">
                <h3 class="text-lg font-medium text-gray-700">自己紹介</h3>
                <p class="text-gray-600">ここに自己紹介文が入ります。ユーザーの価値観や趣味、仕事についての簡単な説明を記載します。</p>
            </div>
            <div class="mb-4">
                <h3 class="text-lg font-medium text-gray-700">スキル</h3>
                <ul class="text-gray-600 list-disc list-inside">
                    <li>スキル1</li>
                    <li>スキル2</li>
                    <li>スキル3</li>
                </ul>
            </div>
            <div class="mb-4">
                <h3 class="text-lg font-medium text-gray-700">価値観</h3>
                <p class="text-gray-600">ユーザーの価値観に関する情報を記載します。</p>
            </div>
            <div>
                <h3 class="text-lg font-medium text-gray-700">連絡先</h3>
                <p class="text-gray-600">メールアドレス: example@example.com</p>
            </div>
        </section>
    </main>
</body>
</html>
