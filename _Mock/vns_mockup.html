<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>masakinihirota Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-gray-100">
    <header class="p-4 text-center text-white bg-green-500">
        <h1 class="text-2xl font-bold">masakinihirota</h1>
        <p class="text-lg">インターネットの情報洪水の中から価値あるものを拾い上げるサービス</p>
    </header>
    <main class="p-8">
        <section class="mb-8">
            <h2 class="text-xl font-semibold text-gray-800">特徴</h2>
            <div class="p-4 mb-4 bg-white border border-gray-300 rounded-lg">
                <h3 class="text-lg font-medium text-gray-700">価値観マッチング</h3>
                <p class="text-gray-600">同じ価値観を持つ人々をつなげる</p>
            </div>
            <div class="p-4 bg-white border border-gray-300 rounded-lg">
                <h3 class="text-lg font-medium text-gray-700">グループ作成</h3>
                <p class="text-gray-600">マッチングした人々でグループを作り、一緒に活動する</p>
            </div>
        </section>
        <section class="mb-8">
            <h2 class="text-xl font-semibold text-gray-800">哲学</h2>
            <p class="text-gray-600"><strong>SNS:</strong> 表現の自由か？ヘイト社会か？</p>
            <p class="text-gray-600"><strong>VNS:</strong> 安心安全か？管理社会か？</p>
            <p class="text-gray-600"><strong>役割:</strong> SNSは「剣」、VNSは「盾」</p>
            <p class="text-gray-600"><strong>オアシス宣言:</strong> 他者を不当に批判せず、建設的な議論を提供する</p>
        </section>
        <section>
            <h2 class="text-xl font-semibold text-gray-800">アプローチ</h2>
            <p class="text-gray-600">ボトムアップ方式で問題を短時間で解決</p>
        </section>
    </main>
</body>
</html>
