name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  db-guard:
    name: DB Guard (PR Gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_db
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration file integrity check
        run: pnpm db:check-migration-files

      - name: Migrate on empty DB
        run: pnpm db:migrate

      - name: Schema check
        run: pnpm db:check-schema

  checks:
    runs-on: ubuntu-latest
    needs: db-guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (TypeScript)
        run: pnpm exec tsc --noEmit -p .

      - name: Lint
        run: pnpm exec eslint . --ext .ts,.tsx --max-warnings=0

      - name: Build (Next.js)
        run: pnpm exec next build

      - name: Run unit tests
        run: pnpm test

      - name: Run RBAC Equivalence Tests
        run: pnpm test:eq

      - name: Dependency audit
        run: pnpm audit --audit-level=moderate

  # Optional: create a preview deploy job for PRs (Vercel integration or similar)
