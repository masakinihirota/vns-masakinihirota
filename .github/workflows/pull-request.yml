name: プルリクエストチェック

# トリガー設定
on:
  pull_request:
    types: [opened, synchronize, reopened]

# 環境変数
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.7.0'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

# ジョブ定義
jobs:
  # コードチェック
  code-check:
    name: コードチェック
    runs-on: ubuntu-latest

    steps:
      # リポジトリのチェックアウト
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      # Node.jsのセットアップ
      - name: Node.js ${{ env.NODE_VERSION }} のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # pnpmのインストール
      - name: pnpm ${{ env.PNPM_VERSION }} のインストール
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 依存関係のインストール
      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      # Biomeによるコードチェック
      - name: Biomeによるコードチェック
        run: pnpm check

      # TypeScriptの型チェック
      - name: TypeScriptの型チェック
        run: pnpm exec tsc --noEmit

  # テストとカバレッジチェック
  test:
    name: テストとカバレッジチェック
    runs-on: ubuntu-latest
    needs: code-check

    steps:
      # リポジトリのチェックアウト
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      # Node.jsのセットアップ
      - name: Node.js ${{ env.NODE_VERSION }} のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # pnpmのインストール
      - name: pnpm ${{ env.PNPM_VERSION }} のインストール
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 依存関係のインストール
      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      # ユニットテストの実行とカバレッジレポートの生成
      - name: ユニットテストの実行
        run: pnpm test:coverage

      # カバレッジ閾値のチェック
      - name: カバレッジ閾値のチェック
        run: pnpm test:coverage:threshold

      # カバレッジレポートのアップロード
      - name: カバレッジレポートのアップロード
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # カバレッジレポートのPRコメント
      - name: カバレッジレポートのPRコメント
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          title: 'テストカバレッジレポート'

      # テスト結果のサマリー表示
      - name: テスト結果のサマリー表示
        run: |
          echo "## テスト結果 :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "- テスト実行日時: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- カバレッジレポート: [詳細レポートを確認](./coverage/index.html)" >> $GITHUB_STEP_SUMMARY
          cat coverage/text-summary.txt >> $GITHUB_STEP_SUMMARY

  # ビルドチェック
  build-check:
    name: ビルドチェック
    runs-on: ubuntu-latest
    needs: test

    steps:
      # リポジトリのチェックアウト
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      # Node.jsのセットアップ
      - name: Node.js ${{ env.NODE_VERSION }} のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # pnpmのインストール
      - name: pnpm ${{ env.PNPM_VERSION }} のインストール
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 依存関係のインストール
      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      # 本番ビルドの実行
      - name: 本番ビルドの実行
        run: pnpm build

      # ビルド結果のサマリー表示
      - name: ビルド結果のサマリー表示
        run: |
          echo "## ビルド結果 :package:" >> $GITHUB_STEP_SUMMARY
          echo "- ビルド実行日時: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- ビルドステータス: 成功 :white_check_mark:" >> $GITHUB_STEP_SUMMARY

  # PRステータスの更新
  update-status:
    name: PRステータスの更新
    runs-on: ubuntu-latest
    needs: [code-check, test, build-check]
    if: always()

    steps:
      - name: PRステータスの確認
        id: check
        run: |
          if [ "${{ needs.code-check.result }}" == "success" ] && [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.build-check.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: PRステータスの更新
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo, number } = context.issue;
            const status = "${{ steps.check.outputs.status }}";

            if (status === "success") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: "✅ すべてのチェックが成功しました！\n\n- コードチェック: 成功\n- テスト: 成功\n- ビルド: 成功"
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: "❌ 一部のチェックが失敗しました。詳細はワークフローの実行結果を確認してください。"
              });
            }
