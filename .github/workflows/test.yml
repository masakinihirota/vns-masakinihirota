name: テストとカバレッジチェック

# トリガー設定
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # 手動実行も可能に
  workflow_dispatch:

# 環境変数
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.7.0'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

# ジョブ定義
jobs:
  # ユニットテストとカバレッジチェック
  test:
    name: テストとカバレッジチェック
    runs-on: ubuntu-latest

    steps:
      # リポジトリのチェックアウト
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      # Node.jsのセットアップ
      - name: Node.js ${{ env.NODE_VERSION }} のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # pnpmのインストール
      - name: pnpm ${{ env.PNPM_VERSION }} のインストール
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 依存関係のインストール
      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      # ユニットテストの実行とカバレッジレポートの生成
      - name: ユニットテストの実行
        run: pnpm test:coverage

      # カバレッジ閾値のチェック
      - name: カバレッジ閾値のチェック
        run: pnpm test:coverage:threshold

      # カバレッジレポートのアップロード
      - name: カバレッジレポートのアップロード
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # カバレッジレポートの詳細分析
      - name: カバレッジレポートの詳細分析
        run: pnpm test:coverage:report

      # テスト結果のサマリー表示
      - name: テスト結果のサマリー表示
        run: |
          echo "## テスト結果 :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "- テスト実行日時: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- テスト総数: $(grep -o 'Test Files' coverage/text-summary.txt | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- カバレッジレポート: [詳細レポートを確認](./coverage/index.html)" >> $GITHUB_STEP_SUMMARY
          cat coverage/text-summary.txt >> $GITHUB_STEP_SUMMARY

  # E2Eテスト
  e2e:
    name: E2Eテスト
    runs-on: ubuntu-latest
    needs: test

    steps:
      # リポジトリのチェックアウト
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      # Node.jsのセットアップ
      - name: Node.js ${{ env.NODE_VERSION }} のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # pnpmのインストール
      - name: pnpm ${{ env.PNPM_VERSION }} のインストール
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 依存関係のインストール
      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      # Playwrightのインストール
      - name: Playwrightのインストール
        run: pnpm exec playwright install --with-deps

      # テスト用ビルド
      - name: テスト用ビルド
        run: pnpm build:test

      # E2Eテストの実行
      - name: E2Eテストの実行
        run: pnpm test:e2e

      # テストレポートのアップロード
      - name: テストレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # テスト結果のサマリー表示
      - name: E2Eテスト結果のサマリー表示
        if: always()
        run: |
          echo "## E2Eテスト結果 :globe_with_meridians:" >> $GITHUB_STEP_SUMMARY
          echo "- テスト実行日時: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- テストレポート: [詳細レポートを確認](./playwright-report/index.html)" >> $GITHUB_STEP_SUMMARY

  # ビルド検証
  build:
    name: ビルド検証
    runs-on: ubuntu-latest
    needs: [test, e2e]

    steps:
      # リポジトリのチェックアウト
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      # Node.jsのセットアップ
      - name: Node.js ${{ env.NODE_VERSION }} のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # pnpmのインストール
      - name: pnpm ${{ env.PNPM_VERSION }} のインストール
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # 依存関係のインストール
      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      # 本番ビルドの実行
      - name: 本番ビルドの実行
        run: pnpm build

      # ビルド結果のサマリー表示
      - name: ビルド結果のサマリー表示
        run: |
          echo "## ビルド結果 :package:" >> $GITHUB_STEP_SUMMARY
          echo "- ビルド実行日時: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- ビルドステータス: 成功 :white_check_mark:" >> $GITHUB_STEP_SUMMARY

# 通知設定
# (オプション) Slackやメール通知を追加する場合はここに設定
